<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Меню</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: url('https://cdn.discordapp.com/attachments/1429153680405303339/1492898154784231534/image.png') no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .menu {
        text-align: center;
    }

    .play-btn {
        padding: 20px 50px;
        font-size: 28px;
        border: none;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .play-btn:hover {
        background: rgba(255, 0, 0, 0.8);
        transform: scale(1.1);
    }
</style>

</head>
<body>

<div class="menu">
    <button class="play-btn" onclick="startGame()">Играть</button>
</div>

<script>
function startGame() {
    window.location.href = "game.html";
}
</script>

</body>
</html>
