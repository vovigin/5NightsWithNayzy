<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Меню</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: url('bg.png') no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .play-btn {
        padding: 20px 50px;
        font-size: 28px;
        border: none;
        border-radius: 10px;
        background: rgba(0,0,0,0.7);
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    .play-btn:hover {
        transform: scale(1.1);
        background: rgba(255,0,0,0.8);
    }
</style>

</head>

<body>

<button class="play-btn" onclick="location.href='game.html'">Играть</button>

</body>
</html>
